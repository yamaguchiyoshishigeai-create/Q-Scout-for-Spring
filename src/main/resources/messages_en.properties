rule.R001.message.high=Controller performs write or use-case-level repository access directly. Move this logic behind a service layer.
rule.R001.message.medium=Controller reads from repository directly. Prefer service mediation to preserve separation of concerns and future extensibility.
rule.R001.message.low=Controller performs a simple read-only repository access. This may be acceptable in limited cases, but service mediation is usually preferable.
rule.R002.message.fieldInjection=Field injection detected. Prefer constructor injection.
rule.R003.message.controllerTransactional=Controller should usually not manage transactions directly.
rule.R003.message.serviceBoundary=Service-like class may be missing transactional boundary.
rule.R004.message.swallowed=Caught exception appears to be swallowed without logging or rethrow.
