page.home.section.about.title=About This Tool
page.home.section.about.copy=This short section helps portfolio viewers and first-time users understand the product direction and technical shape quickly.
page.home.about.users.title=Target users
page.home.about.users.copy=Built for Spring developers, tech leads aligning review standards, and teams trying to visualize quality issues earlier.
page.home.about.highlights.title=Technical highlights
page.home.about.highlights.copy=It wraps a CLI-based analysis pipeline in a lightweight Web MVP while keeping an AI-independent diagnosis core and separated Markdown outputs.
page.home.about.core.title=AI-independent core
page.home.about.core.copy=The rule engine and scoring logic provide value on their own, with AI usage treated as an optional next step rather than a dependency.
page.home.about.outputs.title=Separated outputs
page.home.about.outputs.copy=Human-readable Markdown and AI input Markdown are split so review sharing and AI-assisted follow-up can start from the same analysis.
page.home.artifact.human.title=Human-readable Markdown
page.home.artifact.human.copy=A report designed for people to review the score and findings in a format that is easy to share and discuss.
page.home.artifact.ai.title=AI input Markdown
page.home.artifact.ai.copy=A Markdown file structured to be pasted into AI tools when you want to ask for remediation ideas or next-step guidance.
