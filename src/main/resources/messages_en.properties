rule.R002.name=Field Injection
rule.R003.name=Transactional Misuse
rule.R004.name=Exception Swallowing
rule.R005.name=Missing Test
rule.R006.name=Package Dependency Violation
rule.R001.message.high=Controller performs write or use-case-level repository access directly. Move this logic behind a service layer.
rule.R001.message.medium=Controller reads from repository directly. Prefer service mediation to preserve separation of concerns and future extensibility.
rule.R001.message.low=Controller performs a simple read-only repository access. This may be acceptable in limited cases, but service mediation is usually preferable.
rule.R002.message.fieldInjection=Field injection detected. Prefer constructor injection.
rule.R003.message.controllerTransactional=Controller should usually not manage transactions directly.
rule.R003.message.serviceBoundary=Service-like class may be missing transactional boundary.
rule.R004.message.swallowed=Caught exception appears to be swallowed without logging or rethrow.
rule.R005.message.missingTest=Test class not found for {0}.
rule.R006.message.controllerImportsRepository=Controller imports repository layer directly.
rule.R006.message.repositoryDependsUpper=Repository depends on upper layer package.
report.section.guide=How To Read This Report
report.guide.1=This report highlights Spring project design health and alignment with common best practices.
report.guide.2=Read the score together with the meaning of each finding and its likely improvement direction.
report.guide.3=Some findings can be conditionally acceptable depending on context, especially narrow read-only or tutorial-style cases.
report.guide.4=Each rule includes a detailed explanation link so you can move from summary to context quickly.
