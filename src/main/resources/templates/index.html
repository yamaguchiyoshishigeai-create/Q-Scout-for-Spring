<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{page.home.title}">Q-Scout for Spring</title>
    <style>
        :root {
            --bg: linear-gradient(135deg, #f7f1e8 0%, #e6efe9 100%);
            --panel: #fffdf8;
            --ink: #1f2a2e;
            --muted: #5d6a70;
            --accent: #116466;
            --accent-soft: #d7ece9;
            --error-bg: #fdecec;
            --error-border: #d36b6b;
            --success-bg: #edf8f1;
            --success-border: #4d8b63;
        }
        body { margin: 0; font-family: "Segoe UI", "Hiragino Sans", sans-serif; background: var(--bg); color: var(--ink); }
        .shell { max-width: 960px; margin: 0 auto; padding: 32px 20px 64px; }
        .hero, .panel { background: rgba(255, 253, 248, 0.92); border: 1px solid rgba(17, 100, 102, 0.12); border-radius: 20px; box-shadow: 0 18px 40px rgba(31, 42, 46, 0.08); backdrop-filter: blur(8px); }
        .hero { padding: 28px; margin-bottom: 24px; }
        .topbar { display: flex; justify-content: flex-end; margin-bottom: 14px; }
        .lang-switch { display: inline-flex; gap: 12px; padding: 10px 14px; border-radius: 999px; background: rgba(255, 253, 248, 0.92); border: 1px solid rgba(17, 100, 102, 0.12); box-shadow: 0 12px 28px rgba(31, 42, 46, 0.06); }
        .lang-switch a { color: var(--accent); font-weight: 700; text-decoration: none; }
        h1 { margin: 0 0 12px; font-size: clamp(2rem, 4vw, 3rem); }
        .lead { margin: 0; color: var(--muted); line-height: 1.7; }
        .panel { padding: 24px; }
        .limits { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin: 20px 0 24px; }
        .limit-card { background: var(--accent-soft); border-radius: 14px; padding: 14px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; }
        input[type="file"] { width: 100%; padding: 14px; background: white; border: 1px solid #c9d7d8; border-radius: 12px; box-sizing: border-box; }
        button { margin-top: 16px; border: 0; border-radius: 999px; padding: 14px 24px; background: var(--accent); color: white; font-size: 1rem; font-weight: 700; cursor: pointer; }
        button[disabled] { opacity: 0.7; cursor: wait; }
        .notice, .result { margin-top: 24px; border-radius: 16px; padding: 18px; }
        .notice.error { background: var(--error-bg); border: 1px solid var(--error-border); }
        .result { background: var(--success-bg); border: 1px solid var(--success-border); }
        .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin: 18px 0; }
        .metric { background: white; border-radius: 14px; padding: 14px; }
        .metric strong { display: block; font-size: 1.6rem; margin-top: 6px; }
        .downloads a { display: inline-block; margin-right: 12px; margin-top: 10px; color: var(--accent); font-weight: 700; }
        #running { display: none; margin-top: 18px; color: var(--muted); }
    </style>
</head>
<body>
<div class="shell">
    <div class="topbar">
        <nav class="lang-switch" aria-label="Language switcher">
            <a th:href="@{/(lang='ja')}" th:text="#{lang.ja}">日本語</a>
            <a th:href="@{/(lang='en')}" th:text="#{lang.en}">English</a>
        </nav>
    </div>
    <section class="hero">
        <h1 th:text="#{app.title}">Q-Scout for Spring</h1>
        <p class="lead" th:text="#{page.home.lead}">Spring Boot / Maven プロジェクトの zip をアップロードすると、既存CLI資産を使って品質診断を同期実行し、その場で結果と Markdown を返します。</p>
    </section>
    <section class="panel">
        <form method="post" th:action="@{/analyze}" enctype="multipart/form-data" id="analyzeForm">
            <div class="limits">
                <div class="limit-card"><div th:text="#{limit.allowedFileType}">対応形式</div><strong th:text="${limits.allowedFileType}">zip</strong></div>
                <div class="limit-card"><div th:text="#{limit.maxUploadSize}">最大サイズ</div><strong><span th:text="${limits.maxUploadSizeMb}">20</span><span th:text="#{unit.mb}">MB</span></strong></div>
                <div class="limit-card"><div th:text="#{limit.maxExecutionTime}">実行制限</div><strong><span th:text="${limits.maxExecutionSeconds}">60</span><span th:text="#{unit.seconds}">秒</span></strong></div>
            </div>
            <label for="projectZip" th:text="#{form.upload.label}">pom.xml を含む Spring Boot / Maven / 単一モジュールの zip を選択してください</label>
            <input id="projectZip" type="file" name="projectZip" accept=".zip,application/zip">
            <button id="submitButton" type="submit" th:text="#{form.upload.button}">解析を実行する</button>
            <p id="running" th:text="#{form.upload.running}">解析中です。しばらくお待ちください。</p>
        </form>
        <div class="notice error" th:if="${error != null}">
            <strong th:text="${error.userMessage}">エラーが発生しました。</strong>
            <p th:if="${error.retryable}" th:text="#{error.retryable}">内容を確認して再度アップロードしてください。</p>
        </div>
        <div class="result" th:if="${response != null}">
            <strong th:text="${response.message}">解析が完了しました。</strong>
            <div class="metrics">
                <div class="metric"><span th:text="#{result.score.label}">総合スコア</span><strong th:text="${response.finalScore}">0</strong></div>
                <div class="metric"><span th:text="#{result.violations.label}">違反件数</span><strong th:text="${response.totalViolations}">0</strong></div>
                <div class="metric"><span>HIGH</span><strong th:text="${response.highCount}">0</strong></div>
                <div class="metric"><span>MEDIUM</span><strong th:text="${response.mediumCount}">0</strong></div>
                <div class="metric"><span>LOW</span><strong th:text="${response.lowCount}">0</strong></div>
            </div>
            <div class="downloads">
                <a th:href="${response.humanDownloadLink.url}" th:text="${response.humanDownloadLink.label}">人間向けMarkdown</a>
                <a th:href="${response.aiDownloadLink.url}" th:text="${response.aiDownloadLink.label}">AI入力Markdown</a>
            </div>
        </div>
    </section>
</div>
<script>
    const form = document.getElementById('analyzeForm');
    const button = document.getElementById('submitButton');
    const running = document.getElementById('running');
    form.addEventListener('submit', function () {
        button.disabled = true;
        running.style.display = 'block';
    });
</script>
</body>
</html>
