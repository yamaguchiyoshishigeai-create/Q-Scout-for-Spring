<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{preview.page.title}">Markdown Preview</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <link rel="stylesheet" th:href="@{/css/preview.css}">
</head>
<body>
<div class="page-shell page-shell--medium">
    <div class="page-header">
        <div class="page-header__links">
            <a class="pill-link" th:href="@{/(lang=${#locale.language})}" th:text="#{nav.home}">解析画面へ戻る</a>
            <a class="pill-link" th:href="@{/help(lang=${#locale.language})}" th:text="#{nav.help}">使い方・仕様</a>
        </div>
        <nav class="lang-switcher">
            <a th:href="${preview.japanesePreviewUrl}" th:text="#{lang.ja}">日本語</a>
            <a th:href="${preview.englishPreviewUrl}" th:text="#{lang.en}">English</a>
        </nav>
    </div>

    <section class="content-panel preview-hero" data-figma-section="preview-panel">
        <p class="section-eyebrow" th:text="${preview.fileKey == 'human'} ? #{preview.section.human} : #{preview.section.ai}">ユーザー向けMarkdownプレビュー</p>
        <h1 class="page-title" th:text="#{preview.page.title}">Markdown Preview</h1>
        <p class="page-copy preview-meta"><span th:text="#{preview.fileName.label}">ファイル</span><strong class="preview-file-name" th:text="${preview.fileName}">qscout-report.md</strong></p>
        <p class="page-copy preview-description" th:text="#{preview.page.description}">内容を確認してからダウンロードできます。</p>
        <div class="page-actions">
            <a class="pill-link" th:href="${preview.downloadUrl}" th:text="#{preview.download.button}">ダウンロード</a>
            <a class="pill-link" th:href="@{/(lang=${#locale.language})}" th:text="#{preview.back.home}">解析画面へ戻る</a>
        </div>
        <div class="markdown-body" th:if="${preview.renderedHtml != null}" th:utext="${preview.renderedHtml}"></div>
        <pre class="code-preview" th:if="${preview.renderedHtml == null}" th:text="${preview.content}"># preview</pre>
    </section>
</div>
</body>
</html>
